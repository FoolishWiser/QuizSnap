name: Sync Releases to Gitee

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 连接 Gitee 并推送 Tag
      - name: Push tags to Gitee
        env:
          GITEE_USER: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -e

          # 1. 检查必要变量是否为空
          if [ -z "$GITEE_USER" ] || [ -z "$GITEE_TOKEN" ] || [ -z "$GITEE_REPO" ]; then
            echo "❌ 缺少必要的 Secret，请检查 GITEE_USERNAME / GITEE_TOKEN / GITEE_REPO 是否已全部配置"
            exit 1
          fi

          REMOTE_URL="https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git"

          # 2. 打印安全地址（隐藏令牌）
          SAFE_URL="https://${GITEE_USER}:***@gitee.com/${GITEE_USER}/${GITEE_REPO}.git"
          echo "👉 远程地址: $SAFE_URL"

          # 3. 测试能否连接 Gitee 仓库
          echo "🔍 正在测试 Gitee 仓库连接..."
          git ls-remote --exit-code "$REMOTE_URL" HEAD
          if [ $? -ne 0 ]; then
            echo "❌ 无法访问 Gitee 仓库，请确认："
            echo "   - 仓库名和用户名是否正确"
            echo "   - 私人令牌是否有效并勾选了 projects 权限"
            exit 1
          fi
          echo "✅ 连接成功"

          # 4. 添加 remote 并推送
          git remote add gitee "$REMOTE_URL" || true

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "📦 手动触发：推送所有 Tag 到 Gitee..."
            git push gitee --tags --force
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "📦 自动触发：推送 Tag $TAG_NAME 到 Gitee..."
            git push gitee "$TAG_NAME" --force
          fi

          echo "✅ Tag 推送完成"

      # 同步 Release 及附件（保持你原来的步骤，不需改动）
      - name: Sync releases and assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          # ... 保持原来的同步脚本，不用动 ...
          # 如果你之前复制的是完整版，这里直接用就行